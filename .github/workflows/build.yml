---
name: "Build"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 22,4,10,16 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: "Build and publish release"
    runs-on: ubuntu-latest
    outputs:
      release_changed: ${{ steps.publish_release.outputs.release_changed }}

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "tools/.python-version"

      - name: "Install dependencies"
        run: |
          set -Eexuo pipefail
          pip install --upgrade pip
          pip install -r tools/requirements.txt

      - name: "Generate and publish release assets"
        id: publish_release
        env:
          PUBLISH_RELEASE_BRANCH: ${{ github.ref_name == 'master' && github.event_name != 'pull_request' }}
        run: |
          bash tools/build.sh
          python3 tools/render.py
          bash tools/publish.sh

      - name: "Upload release artifact"
        uses: actions/upload-artifact@v7
        if: steps.publish_release.outputs.release_changed == 'true'
        with:
          name: artifact-${{ github.sha }}-${{ github.run_number }}
          path: ./publish
          if-no-files-found: error
          retention-days: 1

  deploy_to_cloudflare:
    needs: [build]
    name: "Deploy to cloudflare pages"
    if: github.ref_name == 'master' && needs.build.outputs.release_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: "Download release artifact"
        uses: actions/download-artifact@v8
        with:
          name: artifact-${{ github.sha }}-${{ github.run_number }}
          path: publish

      - name: "Deploy to cloudflare pages"
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy publish --project-name=${{ github.event.repository.name }} --commit-dirty=true --branch=${{ github.ref_name }}
          wranglerVersion: "3.114.12"
