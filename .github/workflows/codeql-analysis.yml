---
name: "Codeql analysis"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql-analysis:
    name: "Codeql analysis"
    uses: actions/reusable-workflows/.github/workflows/codeql-analysis.yml@main
    with:
      language: ["actions", "python"]
